<svg width="680" height="620" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Throughput optimization structure for drone delivery airspace</title>
  <desc>Diagram showing the objective, decision variable, four constraints, and closed-form solution</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── OBJECTIVE ── -->
  <rect x="210" y="20" width="260" height="54" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="42" text-anchor="middle" dominant-baseline="central" font-family="Georgia, serif" font-weight="600" font-size="15" fill="#3C3489">Maximize λ</text>
  <text x="340" y="61" text-anchor="middle" dominant-baseline="central" font-family="Georgia, serif" font-size="12" fill="#534AB7">total throughput (drones / sec)</text>

  <!-- Arrow down + label -->
  <line x1="340" y1="74" x2="340" y2="104" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="354" y="93" dominant-baseline="central" font-family="Georgia, serif" font-size="11" fill="#888780">subject to</text>

  <!-- ── C1: CORRIDOR CONFLICTS ── -->
  <rect x="30" y="110" width="145" height="80" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="102" y="133" text-anchor="middle" dominant-baseline="central" font-family="Georgia, serif" font-weight="600" font-size="13" fill="#712B13">C1 — corridor</text>
  <text x="102" y="153" text-anchor="middle" dominant-baseline="central" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#993C1D">λ² · Q ≤ K</text>
  <text x="102" y="172" text-anchor="middle" dominant-baseline="central" font-family="Georgia, serif" font-size="11" fill="#993C1D">quadratic in λ</text>

  <!-- ── C2: INTERSECTION ── -->
  <rect x="190" y="110" width="145" height="80" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="262" y="133" text-anchor="middle" dominant-baseline="central" font-family="Georgia, serif" font-weight="600" font-size="13" fill="#633806">C2 — intersection</text>
  <text x="262" y="153" text-anchor="middle" dominant-baseline="central" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#854F0B">λ · ρ̄_v · τ̄_p ≤ 1</text>
  <text x="262" y="172" text-anchor="middle" dominant-baseline="central" font-family="Georgia, serif" font-size="11" fill="#854F0B">∀ turning node v</text>

  <!-- ── C3: HEADWAY ── -->
  <rect x="350" y="110" width="145" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="422" y="133" text-anchor="middle" dominant-baseline="central" font-family="Georgia, serif" font-weight="600" font-size="13" fill="#085041">C3 — headway</text>
  <text x="422" y="153" text-anchor="middle" dominant-baseline="central" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#0F6E56">λ · μ̄_{e,a} ≤ v_c/h_sep</text>
  <text x="422" y="172" text-anchor="middle" dominant-baseline="central" font-family="Georgia, serif" font-size="11" fill="#0F6E56">∀ edge-altitude (e, a)</text>

  <!-- ── C4: ZONE ── -->
  <rect x="510" y="110" width="140" height="80" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="580" y="133" text-anchor="middle" dominant-baseline="central" font-family="Georgia, serif" font-weight="600" font-size="13" fill="#0C447C">C4 — zone cap</text>
  <text x="580" y="153" text-anchor="middle" dominant-baseline="central" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#185FA5">λ · T_z ≤ cap_z</text>
  <text x="580" y="172" text-anchor="middle" dominant-baseline="central" font-family="Georgia, serif" font-size="11" fill="#185FA5">∀ zone z (optional)</text>

  <!-- Arrows from objective to constraints -->
  <line x1="273" y1="74" x2="103" y2="110" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="310" y1="74" x2="262" y2="110" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="362" y1="74" x2="422" y2="110" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="400" y1="74" x2="552" y2="110" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ── Q DECOMPOSITION ── -->
  <rect x="30" y="220" width="285" height="118" rx="8" fill="#F8F7F4" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="172" y="242" text-anchor="middle" dominant-baseline="central" font-family="Georgia, serif" font-weight="600" font-size="13" fill="#2C2C2A">Conflict load coefficient Q</text>
  <line x1="50" y1="255" x2="295" y2="255" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="172" y="272" text-anchor="middle" dominant-baseline="central" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#3d3d3a">Q = (T/2) · Σ_{e,a} μ̄²_{e,a} · (l_e / v_c)</text>
  <text x="50" y="296" dominant-baseline="central" font-family="Georgia, serif" font-size="11" fill="#5F5E5A">μ̄_{e,a} = Σ_{(i,j): e∈π_{ij}, a(e)=a}  d_{ij} / D</text>
  <text x="50" y="318" dominant-baseline="central" font-family="Georgia, serif" font-size="11" fill="#5F5E5A">= demand-weighted edge-altitude flow</text>

  <!-- Arrow C1 → Q box -->
  <line x1="103" y1="190" x2="103" y2="220" stroke="#993C1D" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arrow-gray)"/>

  <!-- ── PROTOCOL TURN TIMES ── -->
  <rect x="335" y="220" width="310" height="118" rx="8" fill="#F8F7F4" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="490" y="242" text-anchor="middle" dominant-baseline="central" font-family="Georgia, serif" font-weight="600" font-size="13" fill="#2C2C2A">Protocol turn times τ̄_p(v)</text>
  <line x1="355" y1="255" x2="625" y2="255" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="355" y="272" dominant-baseline="central" font-family="Courier New, monospace" font-size="11" fill="#5F5E5A">Turn Layer:   climb + 4s + descend</text>
  <text x="355" y="292" dominant-baseline="central" font-family="Courier New, monospace" font-size="11" fill="#5F5E5A">Int. Cube:    √(2·side² + Δalt²) / v</text>
  <text x="355" y="312" dominant-baseline="central" font-family="Courier New, monospace" font-size="11" fill="#5F5E5A">Sphereabout:  r · arc_angle / v_arc</text>

  <!-- Arrow C2 → τ box -->
  <line x1="262" y1="190" x2="400" y2="220" stroke="#854F0B" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arrow-gray)"/>

  <!-- ── CLOSED FORM SOLUTION ── -->
  <rect x="30" y="368" width="620" height="68" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="340" y="390" text-anchor="middle" dominant-baseline="central" font-family="Georgia, serif" font-weight="600" font-size="13" fill="#085041">Closed-form optimal throughput</text>
  <text x="340" y="415" text-anchor="middle" dominant-baseline="central" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#0F6E56">λ* = min ( √(K_max/Q),  min_v 1/(ρ̄_v·τ̄_p),  min_{e,a} (v_c/h_sep)/μ̄_{e,a},  min_z cap_z/T_z )</text>

  <!-- Arrows to solution box -->
  <line x1="103" y1="338" x2="140" y2="368" stroke="#993C1D" stroke-width="1" marker-end="url(#arrow-gray)"/>
  <line x1="262" y1="338" x2="230" y2="368" stroke="#854F0B" stroke-width="1" marker-end="url(#arrow-gray)"/>
  <line x1="422" y1="338" x2="420" y2="368" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow-gray)"/>
  <line x1="580" y1="190" x2="570" y2="368" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow-gray)"/>

  <!-- ── LEGEND / BINDING CONSTRAINT GUIDE ── -->
  <rect x="30" y="462" width="620" height="142" rx="8" fill="#F8F7F4" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="340" y="484" text-anchor="middle" dominant-baseline="central" font-family="Georgia, serif" font-weight="600" font-size="13" fill="#2C2C2A">Which constraint binds? (depends on config)</text>
  <line x1="50" y1="496" x2="630" y2="496" stroke="#B4B2A9" stroke-width="0.5"/>

  <rect x="50" y="507" width="10" height="10" rx="2" fill="#D85A30"/>
  <text x="68" y="517" dominant-baseline="central" font-family="Georgia, serif" font-size="11" fill="#3d3d3a">√(K_max/Q)       → topology (path routing) + demand shape d_{ij} + altitude assignment rule</text>

  <rect x="50" y="529" width="10" height="10" rx="2" fill="#BA7517"/>
  <text x="68" y="539" dominant-baseline="central" font-family="Georgia, serif" font-size="11" fill="#3d3d3a">1/(ρ̄_v · τ̄_p)  → turning protocol (τ̄_p) + route geometry (ρ̄_v) — bottleneck intersections</text>

  <rect x="50" y="551" width="10" height="10" rx="2" fill="#1D9E75"/>
  <text x="68" y="561" dominant-baseline="central" font-family="Georgia, serif" font-size="11" fill="#3d3d3a">(v_c/h_sep)/μ̄    → dense demand corridors; h_sep=50 m → lane cap = 0.3 drones/s; protocol-independent</text>

  <rect x="50" y="573" width="10" height="10" rx="2" fill="#378ADD"/>
  <text x="68" y="583" dominant-baseline="central" font-family="Georgia, serif" font-size="11" fill="#3d3d3a">cap_z / T_z      → zone admission caps; tightens near high-density SF neighbourhoods</text>

  <text x="50" y="596" dominant-baseline="central" font-family="Georgia, serif" font-style="italic" font-size="10" fill="#888780">Turn Layer typically binds on C2 (slow turns); Intersection Cube &amp; Sphereabout on C1 (faster turns → higher corridor density)</text>
</svg>
